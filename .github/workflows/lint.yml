name: Lint
on:
  push:
    paths:
      - '**.lua'
      - '.github/workflows/lint.yml'
  pull_request:
    paths:
      - '**.lua'
      - '.github/workflows/lint.yml'

permissions:
  checks: write
  contents: read
  pull-requests: read

jobs:
  lint:
    name: Lint Resource
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - name: Lint
        uses: iLLeniumStudios/fivem-lua-lint-action@34cd2cab09ffeb2385c0933508be493c5aebb7fb # v2
        with:
          capture: "junit.xml"
          args: "-t --formatter JUnit"
          extra_libs: ox_lib+mysql+qblocales+qbox+qbox_playerdata+qbox_lib
      - name: Generate Lint Report
        if: always() && (github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository)
        uses: mikepenz/action-junit-report@db71d41eb79864e25ab0337e395c352e84523afe # v4
        with:
          report_paths: "**/junit.xml"
          check_name: Linting Report
          fail_on_failure: false
